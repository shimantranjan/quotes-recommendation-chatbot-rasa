#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

version: "3.1"

stories:
- story: test greet path
  steps:
  - user: |
      hello there
    intent: greet
  - action: utter_greet

- story: test love quote path
  steps:
  - user: |
      give me a romantic quote
    intent: love_quote
  - action: action_love_quote

- story: test motivation quote path
  steps:
  - user: |
      i need to be motivated today
    intent: motivation_quote
  - action: action_motivation_quote

- story: test success quote path
  steps:
  - user: |
      give me a success quote
    intent: success_quote
  - action: action_success_quote

- story: test funny quote path
  steps:
  - user: |
      make me laugh
    intent: funny_quote
  - action: action_funny_quote

- story: test thank you path
  steps:
  - user: |
      thank you
    intent: thank_you
  - action: utter_thank_you

- story: test goodbye path
  steps:
  - user: |
      bye bye
    intent: goodbye
  - action: utter_goodbye
